apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-demo
  template:
    metadata:
      labels:
        app: django-demo
    spec:
      containers:
        - name: django-demo
          image: keerthana2003bggowd/django-demo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: django-demo-svc
spec:
  type: NodePort
  selector:
    app: django-demo
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30091